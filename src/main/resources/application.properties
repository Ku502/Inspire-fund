# =============================================
# InspireFund — Spring Boot Configuration
# Works locally AND on Render automatically
# =============================================

# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/inspirefund_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_mysql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
# Limits to 2 connections max — leaves 1 free for phpMyAdmin on free tier
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${APP_JWT_SECRET:InspireFund2025SuperSecretKeyForJWTSigningMustBe256BitsLong!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_YOUR_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:YOUR_KEY_SECRET}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:5500,https://inspirefund.netlify.app}

# Logging
logging.level.com.inspirefund=DEBUG
logging.level.org.springframework.security=WARN
