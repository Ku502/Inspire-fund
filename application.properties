# =============================================
# InspireFund — Spring Boot Configuration
# Works locally AND on Railway automatically
# =============================================

# Server
server.port=${PORT:8080}

# Database
# Local: fill in your MySQL password below
# Railway: set SPRING_DATASOURCE_* env vars in Railway dashboard
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/inspirefund_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_mysql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${APP_JWT_SECRET:InspireFund2025SuperSecretKeyForJWTSigningMustBe256BitsLong!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Razorpay
# Local: replace with your test keys from razorpay.com dashboard
# Railway: set RAZORPAY_KEY_ID and RAZORPAY_KEY_SECRET env vars
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_YOUR_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:YOUR_KEY_SECRET}

# CORS — allows both local dev and your live Netlify frontend
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:5500,https://inspirefund.netlify.app}

# Logging
logging.level.com.inspirefund=DEBUG
logging.level.org.springframework.security=WARN
