# =============================================
# InspireFund — Spring Boot Configuration
# =============================================

# Server
server.port=8080

# Database (update credentials below)
spring.datasource.url=jdbc:mysql://localhost:3306/inspirefund_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=InspireFund2025SuperSecretKeyForJWTSigningMustBe256BitsLong!
app.jwt.expiration-ms=86400000

# Razorpay (get keys from razorpay.com dashboard → test mode)
razorpay.key.id=rzp_test_YOUR_KEY_ID
razorpay.key.secret=YOUR_KEY_SECRET

# CORS
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# Logging
logging.level.com.inspirefund=DEBUG
logging.level.org.springframework.security=WARN
